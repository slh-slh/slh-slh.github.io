<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中生个人成绩管理系统</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232563EB'/%3E%3Cstop offset='100%25' stop-color='%2310B981'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g1)'/%3E%3Cpath d='M25 70 L25 40 L40 55 L55 35 L70 50 L85 25' stroke='white' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='25' cy='40' r='6' fill='%23F59E0B'/%3E%3Ccircle cx='40' cy='55' r='6' fill='%23EF4444'/%3E%3Ccircle cx='55' cy='35' r='6' fill='%238B5CF6'/%3E%3Ccircle cx='70' cy='50' r='6' fill='%2306B6D4'/%3E%3Ccircle cx='85' cy='25' r='6' fill='%23F59E0B'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --primary-light: #3B82F6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg-light: #F8FAFC;
            --bg-dark: #1E293B;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --card-bg: #FFFFFF;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #2563EB 0%, #10B981 50%, #F59E0B 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4);
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .logo-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
        }

        .logo-subtitle {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.75);
            white-space: nowrap;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .header-nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .nav-btn.active {
            background: white;
            color: var(--primary);
            border-color: white;
        }

        .main-content {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg-light);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .subject-card {
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .subject-name {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .subject-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .subject-inputs input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            text-align: center;
        }

        .subject-inputs label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 0.875rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg-light);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 0.95rem;
        }

        tbody tr:hover {
            background: var(--bg-light);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-primary {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.25rem;
            border-radius: var(--radius);
            text-align: center;
        }

        .stat-card.green {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
        }

        .stat-card.orange {
            background: linear-gradient(135deg, var(--warning) 0%, #D97706 100%);
        }

        .stat-card.blue {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
        }

        .stat-card.red {
            background: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%);
        }

        .stat-card.purple {
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-secondary);
            position: relative;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .chart-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chart-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .ranking-comparison {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .ranking-card {
            text-align: center;
            padding: 1.25rem;
            background: var(--bg-light);
            border-radius: var(--radius-sm);
        }

        .ranking-level {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .ranking-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
        }

        .ranking-value.green { color: var(--success); }
        .ranking-value.orange { color: var(--warning); }

        .difference-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .difference-indicator.positive {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .difference-indicator.negative {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .difference-indicator.neutral {
            background: var(--bg-light);
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlide 0.2s ease;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--text-primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        .warning-container {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border: 1px solid #F59E0B;
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .warning-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: #92400E;
            margin-bottom: 0.75rem;
        }

        .warning-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: #F59E0B;
            color: white;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
        }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .warning-item {
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            color: #92400E;
            border: 1px solid #FCD34D;
        }

        .warning-item.negative {
            background: #FEE2E2;
            border-color: #FCA5A5;
            color: #991B1B;
        }

        @media (max-width: 768px) {
            * {
                box-sizing: border-box;
            }

            html, body {
                overflow-x: hidden;
            }

            header {
                padding: 0.75rem 1rem;
                position: sticky;
                top: 0;
                z-index: 100;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .logo {
                gap: 0.5rem;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
            }

            .logo-icon svg {
                width: 22px;
                height: 22px;
            }

            .logo-title {
                font-size: 1rem;
            }

            .logo-subtitle {
                font-size: 0.65rem;
            }

            .header-nav {
                width: 100%;
                overflow-x: auto;
                padding-bottom: 0.5rem;
                -webkit-overflow-scrolling: touch;
            }

            .nav-btn {
                padding: 0.5rem 0.9rem;
                font-size: 0.85rem;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .main-content {
                padding: 1rem 0.75rem;
            }

            .card {
                padding: 1rem;
                margin-bottom: 1rem;
                border-radius: 8px;
            }

            .card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
                margin-bottom: 1rem;
            }

            .card-title {
                font-size: 1.1rem;
            }

            .card-actions {
                width: 100%;
                justify-content: flex-start;
                gap: 0.5rem;
            }

            .btn {
                padding: 0.5rem 0.9rem;
                font-size: 0.85rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .form-group input {
                padding: 0.6rem;
                font-size: 1rem;
            }

            .subject-card {
                padding: 0.75rem;
            }

            .subject-name {
                font-size: 0.95rem;
                margin-bottom: 0.75rem;
            }

            .subject-inputs {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .subject-inputs input {
                padding: 0.4rem;
                font-size: 0.9rem;
            }

            .subject-inputs label {
                font-size: 0.65rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
                margin-bottom: 1rem;
            }

            .stat-card {
                padding: 0.875rem 0.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .stat-label {
                font-size: 0.7rem;
            }

            .warning-container {
                padding: 0.75rem;
                margin-bottom: 1rem;
            }

            .warning-list {
                flex-direction: column;
            }

            .warning-item {
                width: 100%;
                text-align: center;
            }

            .chart-grid {
                gap: 1rem;
            }

            .chart-container {
                padding: 1rem;
            }

            .chart-title {
                font-size: 1rem;
                margin-bottom: 0.75rem;
            }

            .chart-wrapper {
                height: 220px;
            }

            .table-container {
                margin-top: 0.75rem;
                font-size: 0.85rem;
            }

            table {
                min-width: 500px;
            }

            th, td {
                padding: 0.6rem 0.5rem;
                font-size: 0.8rem;
            }

            th {
                font-size: 0.7rem;
            }

            .badge {
                padding: 0.2rem 0.5rem;
                font-size: 0.7rem;
            }

            .modal-content {
                padding: 1.25rem;
                margin: 0.5rem;
                max-height: 85vh;
            }

            .modal-title {
                font-size: 1.1rem;
            }

            .toast {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }

            .empty-state {
                padding: 2rem 1rem;
            }

            .empty-state-icon {
                font-size: 2rem;
            }

            .empty-state p {
                font-size: 0.9rem;
            }

            .ranking-comparison {
                grid-template-columns: 1fr;
            }

            .tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .tab-btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.85rem;
                white-space: nowrap;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .subject-inputs {
                grid-template-columns: 1fr 1fr;
            }

            .header-nav {
                justify-content: flex-start;
            }

            .card-actions {
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                justify-content: center;
                min-width: calc(50% - 0.25rem);
            }
        }

        .subject-icon {
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .import-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .import-area:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .import-area pre {
            background: var(--bg-light);
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            text-align: left;
            overflow-x: auto;
            margin-top: 1rem;
            max-height: 200px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">

    <div class="toast" id="toast"></div>

    <script>
        const SUBJECTS = {
            chinese: { name: '语文', fullScore: 150, weightedScore: 100 },
            math: { name: '数学', fullScore: 150, weightedScore: 100 },
            english: { name: '英语', fullScore: 150, weightedScore: 100 },
            history: { name: '历史', fullScore: 100, weightedScore: 100 },
            politics: { name: '政治', fullScore: 100, weightedScore: 100 },
            geography: { name: '地理', fullScore: 100, weightedScore: 100 }
        };

        let exams = [];
        let charts = {};
        let currentExamId = null;
        let editingExamId = null;
        let isDataLocked = false;

        function init() {
            loadFromStorage();
            setupNavigation();
            setupTabs();
            updateUI();
            renderAllCharts();
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('gradeManagementExams');
            if (stored) {
                exams = JSON.parse(stored);
            }
        }

        function saveToStorage() {
            localStorage.setItem('gradeManagementExams', JSON.stringify(exams));
        }

        function setupNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    const sectionId = btn.dataset.section;
                    document.getElementById(sectionId).classList.add('active');
                    if (sectionId === 'charts') {
                        renderAllCharts();
                    }
                });
            });
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabGroup = btn.parentElement;
                    tabGroup.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tabId = btn.dataset.tab;
                    tabGroup.parentElement.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById(tabId).classList.add('active');
                });
            });
        }

        function calculateWeightedScore(raw, fullScore, weightedMax) {
            const minRaw = fullScore * 0.3;
            const maxRaw = fullScore * 0.97;
            if (raw >= maxRaw) {
                return weightedMax * 0.98;
            }
            if (raw <= minRaw) {
                return weightedMax * 0.3;
            }
            const normalized = (raw - minRaw) / (maxRaw - minRaw);
            return weightedMax * 0.3 + normalized * (weightedMax * 0.68);
        }

        function getDiffClass(diff) {
            if (diff > 0) return 'positive';
            if (diff < 0) return 'negative';
            return 'neutral';
        }

        function saveExam() {
            const examName = document.getElementById('examName').value.trim();
            const examDate = document.getElementById('examDate').value;

            if (!examName) {
                showToast('请输入考试名称', 'error');
                return;
            }

            const subjects = {};
            let totalRaw = 0;
            let totalWeighted = 0;

            Object.keys(SUBJECTS).forEach(subject => {
                const raw = parseFloat(document.getElementById(`${subject}Raw`).value);
                const classRank = parseInt(document.getElementById(`${subject}ClassRank`).value) || null;
                const schoolRank = parseInt(document.getElementById(`${subject}SchoolRank`).value) || null;
                const districtRank = parseInt(document.getElementById(`${subject}DistrictRank`).value) || null;
                const weightedInput = document.getElementById(`${subject}Weighted`);
                const weighted = weightedInput ? (parseFloat(weightedInput.value) || null) : null;

                if (!isNaN(raw)) {
                    totalRaw += raw;
                    if (weighted !== null) {
                        totalWeighted += weighted;
                    } else {
                        totalWeighted += raw;
                    }
                    subjects[subject] = {
                        raw: raw,
                        weighted: weighted,
                        classRank: classRank,
                        schoolRank: schoolRank,
                        districtRank: districtRank
                    };
                }
            });

            const totalClassRank = parseInt(document.getElementById('totalClassRank').value) || null;
            const totalSchoolRank = parseInt(document.getElementById('totalSchoolRank').value) || null;
            const totalDistrictRank = parseInt(document.getElementById('totalDistrictRank').value) || null;

            const examData = {
                name: examName,
                date: examDate || new Date().toISOString().split('T')[0],
                subjects: subjects,
                totalRaw: totalRaw,
                totalWeighted: totalWeighted,
                classRank: totalClassRank,
                schoolRank: totalSchoolRank,
                districtRank: totalDistrictRank
            };

            if (editingExamId) {
                const index = exams.findIndex(e => e.id === editingExamId);
                if (index !== -1) {
                    exams[index] = { ...exams[index], ...examData };
                    showToast('成绩更新成功！', 'success');
                }
                editingExamId = null;
            } else {
                examData.id = 'exam_' + Date.now();
                exams.push(examData);
                showToast('成绩保存成功！', 'success');
            }

            saveToStorage();
            updateUI();
            clearForm();
            updateEditUI();
        }

        function editExam(examId) {
            const exam = exams.find(e => e.id === examId);
            if (!exam) return;

            editingExamId = examId;
            document.getElementById('examName').value = exam.name;
            document.getElementById('examDate').value = exam.date;

            Object.keys(SUBJECTS).forEach(subject => {
                const data = exam.subjects[subject];
                if (data) {
                    document.getElementById(`${subject}Raw`).value = data.raw;
                    document.getElementById(`${subject}ClassRank`).value = data.classRank || '';
                    document.getElementById(`${subject}SchoolRank`).value = data.schoolRank || '';
                    document.getElementById(`${subject}DistrictRank`).value = data.districtRank || '';
                    const weightedInput = document.getElementById(`${subject}Weighted`);
                    if (weightedInput) weightedInput.value = data.weighted || '';
                }
            });

            document.getElementById('totalClassRank').value = exam.classRank || '';
            document.getElementById('totalSchoolRank').value = exam.schoolRank || '';
            document.getElementById('totalDistrictRank').value = exam.districtRank || '';

            updateEditUI();

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-section="entry"]').classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('entry').classList.add('active');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingExamId = null;
            clearForm();
            updateEditUI();
            showToast('已取消编辑', 'info');
        }

        function updateEditUI() {
            const title = document.getElementById('entryTitle');
            const cancelBtn = document.getElementById('cancelEditBtn');
            
            if (editingExamId) {
                title.textContent = '编辑成绩';
                cancelBtn.style.display = 'inline-flex';
            } else {
                title.textContent = '录入成绩';
                cancelBtn.style.display = 'none';
            }
        }

        function clearForm() {
            document.getElementById('examName').value = '';
            document.getElementById('examDate').value = '';
            Object.keys(SUBJECTS).forEach(subject => {
                document.getElementById(`${subject}Raw`).value = '';
                document.getElementById(`${subject}ClassRank`).value = '';
                document.getElementById(`${subject}SchoolRank`).value = '';
                document.getElementById(`${subject}DistrictRank`).value = '';
                const weightedInput = document.getElementById(`${subject}Weighted`);
                if (weightedInput) weightedInput.value = '';
            });
            document.getElementById('totalClassRank').value = '';
            document.getElementById('totalSchoolRank').value = '';
            document.getElementById('totalDistrictRank').value = '';
        }

        function updateUI() {
            renderExamTable();
            updateStats();
        }

        function renderExamTable() {
            const tbody = document.getElementById('examTableBody');
            if (exams.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-state-icon">暂无数据</div>
                                <p>暂无成绩记录，请先录入成绩</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            const deleteBtnDisabled = isDataLocked ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : '';
            tbody.innerHTML = exams.map(exam => `
                <tr>
                    <td>${exam.name}</td>
                    <td>${exam.date}</td>
                    <td><span class="badge badge-primary">${exam.totalRaw.toFixed(1)}</span></td>
                    <td><span class="badge badge-success">${exam.totalWeighted.toFixed(1)}</span></td>
                    <td>${exam.classRank || '-'}</td>
                    <td>${exam.schoolRank || '-'}</td>
                    <td>${exam.districtRank || '-'}</td>
                    <td>
                        <button class="btn btn-outline" style="padding:0.4rem 0.8rem;" onclick="viewExamDetail('${exam.id}')">查看</button>
                        <button class="btn btn-primary" style="padding:0.4rem 0.8rem;" onclick="editExam('${exam.id}')">编辑</button>
                        <button class="btn btn-outline" style="padding:0.4rem 0.8rem;color:var(--danger);" ${deleteBtnDisabled} onclick="deleteExam('${exam.id}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function viewExamDetail(examId) {
            const exam = exams.find(e => e.id === examId);
            if (!exam) return;

            currentExamId = examId;
            document.getElementById('detailModalTitle').textContent = exam.name;
            document.getElementById('detailModalContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${exam.totalRaw.toFixed(1)}</div>
                        <div class="stat-label">原始总分</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-value">${exam.totalWeighted.toFixed(1)}</div>
                        <div class="stat-label">赋分总分</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-value">${exam.schoolRank || '-'}</div>
                        <div class="stat-label">校级排名</div>
                    </div>
                </div>
                <div class="ranking-comparison" style="margin:1.5rem 0;">
                    <div class="ranking-card">
                        <div class="ranking-level">班级排名</div>
                        <div class="ranking-value">${exam.classRank || '-'}</div>
                    </div>
                    <div class="ranking-card">
                        <div class="ranking-level">校级排名</div>
                        <div class="ranking-value green">${exam.schoolRank || '-'}</div>
                    </div>
                    <div class="ranking-card">
                        <div class="ranking-level">区级排名</div>
                        <div class="ranking-value orange">${exam.districtRank || '-'}</div>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>学科</th>
                            <th>原始分</th>
                            <th>赋分</th>
                            <th>差值</th>
                            <th>班级排名</th>
                            <th>校级排名</th>
                            <th>区级排名</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${Object.keys(SUBJECTS).map(sub => {
                            const data = exam.subjects[sub];
                            if (!data) return '';
                            const weightedDisplay = data.weighted !== null && data.weighted !== undefined ? data.weighted.toFixed(1) : '-';
                            const diffDisplay = data.weighted !== null && data.weighted !== undefined ? `<span class="difference-indicator ${getDiffClass(data.weighted - data.raw)}">${(data.weighted - data.raw) >= 0 ? '+' : ''}${(data.weighted - data.raw).toFixed(1)}</span>` : '-';
                            return `
                                <tr>
                                    <td>${SUBJECTS[sub].name}</td>
                                    <td>${data.raw}</td>
                                    <td>${weightedDisplay}</td>
                                    <td>${diffDisplay}</td>
                                    <td>${data.classRank || '-'}</td>
                                    <td>${data.schoolRank || '-'}</td>
                                    <td>${data.districtRank || '-'}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('examDetailModal').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('examDetailModal').classList.remove('active');
            currentExamId = null;
        }

        function deleteExam(examId) {
            if (isDataLocked) {
                showToast('数据已锁定，请先解锁', 'error');
                return;
            }
            if (confirm('确定要删除这条成绩记录吗？')) {
                exams = exams.filter(e => e.id !== examId);
                saveToStorage();
                updateUI();
                showToast('删除成功', 'success');
            }
        }

        function clearAllData() {
            if (isDataLocked) {
                showToast('数据已锁定，请先解锁', 'error');
                return;
            }
            if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                exams = [];
                saveToStorage();
                updateUI();
                Object.values(charts).forEach(chart => chart.destroy());
                charts = {};
                showToast('数据已清空', 'success');
            }
        }

        function toggleLock() {
            isDataLocked = !isDataLocked;
            const lockBtn = document.getElementById('lockBtn');
            const clearAllBtn = document.getElementById('clearAllBtn');
            if (isDataLocked) {
                lockBtn.textContent = '解锁';
                lockBtn.style.color = 'var(--danger)';
                clearAllBtn.disabled = true;
                clearAllBtn.style.opacity = '0.5';
                clearAllBtn.style.cursor = 'not-allowed';
            } else {
                lockBtn.textContent = '锁定';
                lockBtn.style.color = '';
                clearAllBtn.disabled = false;
                clearAllBtn.style.opacity = '';
                clearAllBtn.style.cursor = '';
            }
            renderExamTable();
        }

        function updateStats() {
            document.getElementById('statExamCount').textContent = exams.length;
            if (exams.length > 0) {
                const scores = exams.map(e => e.totalWeighted);
                const avgScore = scores.reduce((sum, s) => sum + s, 0) / scores.length;
                const maxScore = Math.max(...scores);
                const minScore = Math.min(...scores);
                const variance = scores.reduce((sum, s) => sum + Math.pow(s - avgScore, 2), 0) / scores.length;
                const stdDev = Math.sqrt(variance);
                const bestRank = Math.min(...exams.filter(e => e.schoolRank).map(e => e.schoolRank));

                document.getElementById('statAvgScore').textContent = avgScore.toFixed(1);
                document.getElementById('statBestRank').textContent = bestRank || '-';
                document.getElementById('statMaxScore').textContent = maxScore.toFixed(1);
                document.getElementById('statMinScore').textContent = minScore.toFixed(1);
                document.getElementById('statStdDev').textContent = stdDev.toFixed(1);

                checkWarnings();
            } else {
                document.getElementById('statAvgScore').textContent = '0';
                document.getElementById('statBestRank').textContent = '-';
                document.getElementById('statMaxScore').textContent = '-';
                document.getElementById('statMinScore').textContent = '-';
                document.getElementById('statStdDev').textContent = '-';
                document.getElementById('warningContainer').style.display = 'none';
            }
        }

        function checkWarnings() {
            const warningContainer = document.getElementById('warningContainer');
            const warningList = document.getElementById('warningList');
            const warnings = [];

            if (exams.length < 2) {
                warningContainer.style.display = 'none';
                return;
            }

            const latestExam = exams[exams.length - 1];
            const prevExam = exams[exams.length - 2];

            Object.keys(SUBJECTS).forEach(sub => {
                const latestScore = latestExam.subjects[sub]?.weighted || latestExam.subjects[sub]?.raw;
                const prevScore = prevExam.subjects[sub]?.weighted || prevExam.subjects[sub]?.raw;
                if (latestScore && prevScore) {
                    const diff = latestScore - prevScore;
                    const fullScore = SUBJECTS[sub].fullScore;
                    const threshold = fullScore * 0.05;

                    if (diff <= -threshold) {
                        warnings.push({
                            subject: SUBJECTS[sub].name,
                            diff: diff,
                            type: 'negative'
                        });
                    } else if (diff >= threshold) {
                        warnings.push({
                            subject: SUBJECTS[sub].name,
                            diff: diff,
                            type: 'positive'
                        });
                    }
                }
            });

            if (warnings.length > 0) {
                warningContainer.style.display = 'block';
                warningList.innerHTML = warnings.map(w => {
                    const sign = w.diff >= 0 ? '+' : '';
                    const className = w.type === 'negative' ? 'negative' : '';
                    return `<span class="warning-item ${className}">${w.subject}: ${sign}${w.diff.toFixed(1)}分</span>`;
                }).join('');
            } else {
                warningContainer.style.display = 'none';
            }
        }

        function renderAllCharts() {
            if (exams.length === 0) {
                showToast('请先录入成绩数据', 'error');
                return;
            }
            renderTrendChart();
            renderRankingChart();
        }

        function renderTrendChart() {
            const ctx = document.getElementById('trendChart');
            if (!ctx) return;

            if (charts.trendChart) charts.trendChart.destroy();

            const labels = exams.map(e => e.name);
            const datasets = Object.keys(SUBJECTS).map(sub => {
                const data = exams.map(e => {
                    const weighted = e.subjects[sub]?.weighted;
                    return weighted !== null && weighted !== undefined ? weighted : e.subjects[sub]?.raw || null;
                });
                return {
                    label: SUBJECTS[sub].name,
                    data: data,
                    borderColor: getSubjectColor(sub),
                    backgroundColor: getSubjectColor(sub) + '20',
                    tension: 0.4,
                    fill: false
                };
            });

            charts.trendChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        function renderRankingChart() {
            const ctx = document.getElementById('rankingChart');
            if (!ctx) return;

            if (charts.rankingChart) charts.rankingChart.destroy();

            const labels = exams.map(e => e.name);
            const classRanks = exams.map(e => e.classRank);
            const schoolRanks = exams.map(e => e.schoolRank);
            const districtRanks = exams.map(e => e.districtRank);

            charts.rankingChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '班级排名',
                            data: classRanks,
                            borderColor: '#2563EB',
                            backgroundColor: '#2563EB20',
                            tension: 0.4,
                            fill: false
                        },
                        {
                            label: '校级排名',
                            data: schoolRanks,
                            borderColor: '#10B981',
                            backgroundColor: '#10B98120',
                            tension: 0.4,
                            fill: false
                        },
                        {
                            label: '区级排名',
                            data: districtRanks,
                            borderColor: '#F59E0B',
                            backgroundColor: '#F59E0B20',
                            tension: 0.4,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    scales: {
                        y: { beginAtZero: true, reverse: true }
                    }
                }
            });
        }

        function getSubjectColor(subject) {
            const colors = {
                chinese: '#2563EB',
                math: '#10B981',
                english: '#F59E0B',
                history: '#EF4444',
                politics: '#8B5CF6',
                geography: '#06B6D4'
            };
            return colors[subject] || '#64748B';
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function closeExamDetail() {
            document.getElementById('examDetailCard').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
